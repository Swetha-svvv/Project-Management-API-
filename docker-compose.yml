services:

  db:
    image: postgres:15-alpine
    container_name: project_management_db
    restart: always

    environment:
      POSTGRES_DB: project_management_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d project_management_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .

    container_name: project_management_api

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    ports:
      - "8000:8000"

    restart: always

volumes:
  postgres_data: